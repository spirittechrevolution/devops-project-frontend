name: Build and Push Frontend to Docker Hub

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
    paths:
      - 'project_devops_front/**'
      - '.github/workflows/frontend-docker-build-push.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'project_devops_front/**'

env:
  REGISTRY: docker.io
  IMAGE_NAME: spirittechrevolution/devops-project-frontend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Frontend Docker image
        uses: docker/build-push-action@v4
        with:
          context: ./project_devops_front
          file: ./project_devops_front/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Frontend image pushed successfully
        if: github.event_name != 'pull_request'
        run: echo "Frontend image pushed to ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
